meta:
  slug: open-source-agent-frameworks
  name: Open-source agent framework landscape
  description: Track the open-source LLM agent framework landscape and how individual frameworks differ across execution kernel, multi-agent coordination, tool/memory layer, and deployment story.
  status: accepted
  created_at: '2026-05-26'
  accepted_at: '2026-05-26'

concept_layers:
  - name: Execution kernel
    key: execution-kernel
    description: |
      The core agent loop a framework exposes — ReAct, code-act (CodeAgent / Smolagents
      style), planner-executor, graph state-machine, supervisor/worker, or imperative
      tool-loop. This is the most discriminating layer between frameworks.
  - name: Tool & memory layer
    key: tool-memory-layer
    description: |
      How tools are declared, validated, and dispatched; how short-term scratchpad,
      long-term memory, and retrieval are integrated; how the framework treats
      structured outputs (Pydantic / JSON schema / typed function calls).
  - name: Multi-agent coordination
    key: multi-agent-coordination
    description: |
      Whether and how the framework supports multiple agents — message passing,
      role assignment, handoff/delegation, orchestrator-vs-mesh topology, shared
      state, conflict resolution. Includes interop protocols (MCP, A2A, ACP,
      OpenAI Agents handoff).
  - name: Observability & evaluation
    key: observability-evaluation
    description: |
      Tracing, replay, step-level inspection, integration with eval harnesses,
      cost/latency accounting, deterministic reproducibility for debugging.
  - name: Deployment & portability
    key: deployment-portability
    description: |
      Model-provider neutrality, ability to swap open vs closed backends, packaging
      story (single process vs distributed), runtime cost, fit for browser /
      computer-use vs server-side agents.

execution_routes:
  - name: GitHub landscape snapshot
    key: github-landscape-snapshot
    description: |
      Each cycle, enumerate active open-source agent repos via the GitHub search
      API and trending lists; capture stars, last commit, license, primary
      language, and maintainer org. Flag new entrants and frameworks gone quiet
      (>6 months no commits → anti-pattern: abandoned).
  - name: Official docs & whitepaper read
    key: official-docs-whitepaper-read
    description: |
      For each in-scope framework, read the canonical docs (Quickstart, Architecture,
      Multi-agent / Orchestration page if any). Extract execution kernel pattern,
      tool protocol, memory model, and a one-paragraph differentiator.
  - name: Benchmark comparison studies
    key: benchmark-comparison-studies
    description: |
      Track papers and well-instrumented blog posts that benchmark multiple
      frameworks on the same task (SWE-bench-style coding agents, WebArena /
      Visual-WebArena for browser agents, AgentBench, GAIA). Down-rank marketing
      comparisons without numbers.
  - name: Maintainer blog posts & changelogs
    key: maintainer-blog-posts-changelogs
    description: |
      Follow each framework's official blog / changelog / release notes. Capture
      direction-of-travel signals: API breaks, new orchestration primitives,
      protocol adoption (e.g., MCP), and roadmap.
  - name: Independent engineering write-ups
    key: independent-engineering-write-ups
    description: |
      Engineering blogs and conference talks from teams using these frameworks in
      production — surface real-world friction points, integration gotchas,
      anti-patterns the docs don't admit.
  - name: Example apps & cookbook inspection
    key: example-apps-cookbook-inspection
    description: |
      Walk the official examples / cookbook directory of each framework. Treat
      the choice of example as a signal of intended use case; treat absence as
      a maturity signal.
  - name: Interop & protocol tracking
    key: interop-protocol-tracking
    description: |
      Track vendor-neutral protocols (MCP, A2A, ACP, OpenAI Agents protocol) and
      which frameworks have adopted them. This is where the multi-agent layer
      stops being framework-local and starts being interoperable.
  - name: Browser / computer-use agent thread
    key: browser-computer-use-agent-thread
    description: |
      Track the browser / computer-use sub-ecosystem (browser-use, OpenManus,
      Skyvern, Playwright-based stacks). Distinct enough to deserve its own
      route — execution kernel differs (DOM/vision loop), multi-agent rarely
      applies, evaluation is WebArena-shaped.
  - name: Academic agent literature
    key: academic-agent-literature
    description: |
      Track agent-specific academic releases (arXiv cs.AI / cs.MA) when they
      ship open-source code — e.g., CAMEL, MetaGPT, ChatDev, ReAct, Tree of
      Thoughts, multi-agent gym work. Bias toward ones with usable code, not
      pure-paper proposals.

scope_in:
  - General-purpose open-source agent libraries (LangChain, LlamaIndex agents, AutoGen, Smolagents, Agno, Bee, etc.)
  - Multi-agent / orchestration frameworks (CrewAI, AutoGen, OpenAI Swarm/Agents SDK if open, MetaGPT, ChatDev)
  - Browser / computer-use agent frameworks (browser-use, OpenManus, Skyvern, etc.)
  - Vendor-neutral interop protocols (MCP, A2A, ACP, OpenAI Agents handoff protocol)
  - Tool / memory abstractions that are framework-shaped (not pure libraries)

scope_out:
  - Closed-source agent platforms as platforms (OpenAI Assistants API, Anthropic Computer Use as proprietary product, Bedrock Agents) — only their open spec/protocol counterparts are in-scope
  - LLM serving / inference stacks (vLLM, llama.cpp, TGI) — runtime, not agent
  - Pure RAG libraries with no agent loop (LangChain's retrievers in isolation; LlamaIndex's pure-RAG mode)
  - Standalone workflow / graph engines without LLM-agent specialization (Airflow, Prefect, Temporal) # UNCERTAIN: borderline tools like LangGraph straddle this line — treat LangGraph as in-scope when used as LangChain's agent kernel, out-of-scope as a standalone DSL
  - Hello-world tutorial repos with no production usage evidence (per anti-pattern)
  - Frameworks abandoned or rebranded (>6 months no commits or pivoted to closed source) — capture once as "dead", don't re-deepen

recency_floor: 2024

record_fields:
  - name: framework_name
    key: framework_name
    required: true
    description: Canonical name as the maintainers spell it.
  - name: repo_url
    key: repo_url
    required: true
    description: Primary GitHub (or equivalent) URL.
  - name: maintainer_org
    key: maintainer_org
    required: true
    description: Org or individual that drives releases.
  - name: stars_at_capture
    key: stars_at_capture
    required: false
    description: GitHub stars at the time of this record. Snapshot, not authoritative.
  - name: last_commit_at
    key: last_commit_at
    required: true
    description: Date of last commit to default branch. Used to flag abandoned.
  - name: license
    key: license
    required: true
    description: SPDX identifier (MIT / Apache-2.0 / etc.).
  - name: primary_language
    key: primary_language
    required: true
    description: Python / TypeScript / Rust / Go / mixed.
  - name: execution_kernel_pattern
    key: execution_kernel_pattern
    required: true
    description: One of {ReAct, code-act, planner-executor, graph-state, supervisor-worker, imperative-tool-loop, hybrid}. Free text if hybrid.
  - name: multi_agent_support
    key: multi_agent_support
    required: true
    description: |
      Object — {style: one of [none, orchestrator, mesh, handoff, role-play, swarm],
      notes: free text}.
  - name: tool_protocol
    key: tool_protocol
    required: true
    description: One of {custom, OpenAI tool-calling, MCP, A2A, mixed}. Free text if mixed.
  - name: memory_model
    key: memory_model
    required: false
    description: How short-term scratchpad and long-term memory are exposed (e.g., none / built-in vector store / pluggable / message-list only).
  - name: supported_model_providers
    key: supported_model_providers
    required: true
    description: List of providers/backends the framework explicitly supports.
  - name: observability_story
    key: observability_story
    required: false
    description: Built-in tracing? LangSmith / Phoenix / OTel integration? None?
  - name: typical_use_case
    key: typical_use_case
    required: true
    description: One short paragraph — what is this framework actually good for in practice?
  - name: maturity_signal
    key: maturity_signal
    required: true
    description: One of {early, growing, mature, plateaued, abandoned}. With one-sentence justification.
  - name: one_paragraph_differentiator
    key: one_paragraph_differentiator
    required: true
    description: |
      The single paragraph that captures how this framework differs from its closest
      neighbors. This field is the synthesis editor's main input.
  - name: known_anti_patterns
    key: known_anti_patterns
    required: false
    description: Things this framework is bad at, or fails on, that practitioners have written about.

graph_edge_types:
  - name: belongs_to_route
    key: belongs_to_route
    description: Work X is researched under execution route Y (links a work to its primary route bucket).
  - name: influenced_by
    key: influenced_by
    description: Framework X explicitly draws design from framework Y (cited in docs or maintainer interviews).
  - name: fork_or_rebrand_of
    key: fork_or_rebrand_of
    description: X is a direct fork, rename, or downstream of Y.
  - name: competes_in_niche
    key: competes_in_niche
    description: X and Y target the same primary use case (e.g., both browser agents, both multi-agent orchestration).
  - name: shared_pattern
    key: shared_pattern
    description: X and Y both use the same execution kernel pattern (e.g., both code-act).
  - name: protocol_supports
    key: protocol_supports
    description: X supports interop protocol Y (MCP, A2A, etc.).
  - name: benchmark_pair
    key: benchmark_pair
    description: X and Y are evaluated side-by-side on benchmark Z.
  - name: maintainer_overlap
    key: maintainer_overlap
    description: X and Y share core maintainers / contributors.

report_sections:
  - id: tldr
    title: TL;DR — landscape in one paragraph
    description: One paragraph that, if the reader stopped here, would still give them the right mental model.
  - id: taxonomy
    title: Taxonomy
    description: The axes used to classify frameworks (execution kernel × multi-agent × deployment × niche), with a 2-D visual cue if possible.
  - id: families
    title: Major framework families
    description: One short paragraph per family. Group frameworks first by execution kernel, then by niche.
  - id: comparison
    title: Comparison matrix
    description: Compact feature table — framework × {kernel, multi-agent style, tool protocol, providers, license, maturity}.
  - id: differentiators
    title: Key axes of differentiation
    description: The 4-6 axes that actually distinguish frameworks once you strip the marketing. Each axis discussed in 1-2 paragraphs.
  - id: trends
    title: Trends & inflection points
    description: What's changing (e.g., MCP adoption rate, agent-protocol convergence, browser-agent maturation, shift from ReAct to code-act).
  - id: anti_patterns
    title: Anti-patterns & dead ends
    description: Frameworks gone quiet, design patterns that consistently fail in practice, marketing claims that don't survive contact with benchmarks.
  - id: further_reading
    title: Further reading
    description: The 8-12 most load-bearing citations from records — papers, docs, post-mortems.
  - id: open_questions
    title: Open questions
    description: What the synthesis can't yet decide; what new evidence would close each question.

iteration_mix:
  new_min: 1
  deepen_min: 1
  challenge_min: 1
  synthesis_every_n_cycles: 7
