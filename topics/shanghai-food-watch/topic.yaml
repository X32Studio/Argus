meta:
  slug: shanghai-food-watch
  name: 上海餐厅观察 — Shanghai food & restaurant watch
  description: |
    Track new restaurant openings and hot spots across Shanghai — Black Pearl /
    Michelin / 大众点评 / 小红书 buzz, local food media, openings & closings —
    to maintain a continuously refined personal shortlist of where to eat now.
  status: accepted
  created_at: '2026-05-26'
  accepted_at: '2026-05-26'

concept_layers:
  - name: Cuisine & culinary lineage
    key: cuisine-lineage
    description: |
      What the kitchen actually cooks — 本帮菜, 江浙菜, 粤菜, 川菜, 西北菜, 日料,
      意餐, 法餐, fusion, etc. — and how faithful or interpretive the chef is to
      that lineage. The single most discriminating signal for "is this the kind
      of meal I want."
  - name: Occasion & experience design
    key: occasion-fit
    description: |
      What the restaurant is *for* — solo / casual everyday, friend get-together,
      date, family with kids, business dinner, special occasion, late-night.
      Captures vibe, noise level, service style, and whether the space matches
      the use case. Frequently mismatched in marketing.
  - name: Buzz signals & curatorial authority
    key: buzz-and-authority
    description: |
      Where the attention is coming from — Black Pearl / Michelin (institutional
      authority), 大众点评 (crowd consensus), 小红书 (social/visual virality),
      Time Out / SmartShanghai (editorial), 公众号 long-form reviews, friend
      word-of-mouth. Different sources have very different biases.
  - name: Value & accessibility
    key: value-and-accessibility
    description: |
      Price-per-person vs. perceived quality, location convenience, reservation
      difficulty, queue length, walk-in feasibility. The "should I bother" layer.
  - name: Maturity & staying power
    key: maturity-and-staying-power
    description: |
      Where the restaurant sits in its lifecycle — just-opened hot spot,
      established institution, declining (chef left / quality drop), or
      closed. Buzz fades fast; this layer encodes the cycle.

execution_routes:
  - name: Black Pearl & Michelin Shanghai
    key: black-pearl-and-michelin
    description: |
      Track the annual 黑珍珠 (Black Pearl) list and the Michelin Guide Shanghai
      — diamond/star changes, new entries, drops. Treat these as institutional
      authority signals, biased toward fine dining and 中餐 grand-banquet style.
    anchor_examples:
      - 黑珍珠餐厅指南
      - Michelin Guide Shanghai
  - name: 小红书 / RED trending posts
    key: red-xiaohongshu-trending
    description: |
      Surface restaurants going viral on 小红书 — visual-first, often
      photogenic / queue-driving. High recall for new openings; low precision
      on food quality. Capture and verify against other signals.
    anchor_examples:
      - 小红书 上海 必吃 / 探店
  - name: 大众点评 must-eat & rating shifts
    key: dianping-must-eat
    description: |
      Track 大众点评 "必吃榜" lists, neighborhood top-ranked spots, and
      restaurants whose ratings shift more than 0.3 in a quarter. Crowd
      consensus, biased toward middle-market and accessible cuisine.
    anchor_examples:
      - 大众点评 必吃榜
      - 大众点评 上海 黑珍珠
  - name: English-language editorial reviews
    key: editorial-reviews
    description: |
      SmartShanghai, Time Out Shanghai, That's Shanghai, The Bund Magazine —
      editorial reviews and "best of" lists. Skew toward expat-friendly venues,
      cocktail bars, Western and pan-Asian. Useful for occasion / experience.
    anchor_examples:
      - SmartShanghai food reviews
      - Time Out Shanghai best new restaurants
  - name: Chinese food media & 公众号
    key: chinese-food-media
    description: |
      Long-form WeChat 公众号 reviews (企鹅吃喝指南, 鬼脚七, 食通社, 一大口美食榜),
      Chinese food critics, and bilingual food writers. Strong on 本帮菜, 江浙菜
      and chef interviews; harder to query, often the most substantive layer.
    anchor_examples:
      - 企鹅吃喝指南 上海
      - 一大口美食榜 上海
  - name: New openings & closings tracker
    key: openings-and-closings
    description: |
      Per cycle, surface restaurants that *just* opened (≤ 6 months) and ones
      that *just* closed. Opening velocity by neighborhood is a real signal;
      closures of formerly hyped places are the antidote to recency bias.
  - name: Chef & restaurant group lineage
    key: chef-and-restaurant-group
    description: |
      Track the chefs and groups behind multiple openings (e.g., one chef's
      next concept, one group's expansion across districts). Useful for
      predicting where the next interesting opening will be.
  - name: Personal verdicts & friend reports
    key: personal-verdicts
    description: |
      First-hand visits, friend reports, and the user's own re-reads after a
      meal. Highest-trust source, lowest volume. The synthesis editor should
      weight personal_verdict above any external signal when present.

scope_in:
  - Restaurants physically located in Shanghai municipality (all 16 districts)
  - All cuisines — 本帮菜, 中餐 (all regional), 日料, 西餐, fusion, café food, dessert
  - All price tiers — from <100¥ casual to 800¥+ tasting menus
  - New openings (≤ 12 months) AND established places re-evaluated this cycle
  - Both Chinese-run and foreign-run kitchens
  - Bars and cocktail places when food is a meaningful part of the offering

scope_out:
  - Restaurants outside Shanghai (Hangzhou / Suzhou day-trip destinations only as side notes)
  - Delivery-only / ghost kitchens unless they have notable cult following
  - Pure retail / packaged-food brands (supermarket / convenience-store food)
  - Hotel buffets unless distinctive enough to draw non-guests
  - Historical or closed restaurants except as context for successor concepts
  - Pure dessert / coffee shops with no food offering # UNCERTAIN: borderline — keep if the place is a destination, drop if it's purely a beverage shop

recency_floor: 2024

record_fields:
  - name: restaurant_name_en
    key: restaurant_name_en
    required: false
    description: English or Romanized name as the restaurant uses it. May be empty.
  - name: restaurant_name_zh
    key: restaurant_name_zh
    required: true
    description: Chinese name (canonical, as the restaurant signs itself).
  - name: cuisine_type
    key: cuisine_type
    required: true
    description: |
      Primary cuisine — 本帮菜 / 江浙菜 / 粤菜 / 川菜 / 西北菜 / 日料 / 意餐 / 法餐 /
      fusion / café / 烧烤 / 火锅 / etc. Single primary label, with a free-text
      sub-label if needed (e.g., "日料 (omakase)").
  - name: district
    key: district
    required: true
    description: Shanghai district — 静安 / 黄浦 / 徐汇 / 长宁 / 普陀 / 虹口 / 杨浦 / 浦东 / 闵行 / 宝山 / 嘉定 / 松江 / 青浦 / 奉贤 / 金山 / 崇明.
  - name: neighborhood
    key: neighborhood
    required: false
    description: Sub-district neighborhood (e.g., 武康路, 巨富长, 新天地, 陆家嘴, 安福路).
  - name: address
    key: address
    required: false
    description: Full street address. Optional but populate when known.
  - name: price_per_person_cny
    key: price_per_person_cny
    required: true
    description: |
      Per-person price in CNY — either an integer (point estimate) or a range
      like "200-350". Tasting-menu places: set-menu price.
  - name: opened_at
    key: opened_at
    required: false
    description: When the restaurant opened (YYYY-MM if known, else YYYY).
  - name: head_chef
    key: head_chef
    required: false
    description: Head chef / chef-owner if named publicly. Source attribution required.
  - name: restaurant_group
    key: restaurant_group
    required: false
    description: Restaurant group or parent operator if part of one.
  - name: signature_dishes
    key: signature_dishes
    required: true
    description: |
      Top 1-5 dishes that the restaurant is known for or that reviewers
      consistently mention. Use canonical Chinese names where applicable.
  - name: occasion_fit
    key: occasion_fit
    required: true
    description: |
      List of occasions this place suits — {solo, casual, friends, date,
      family-with-kids, business, special-occasion, late-night}.
  - name: reservation_difficulty
    key: reservation_difficulty
    required: false
    description: |
      One of {walk-in-ok, recommended, required, weeks-ahead, lottery}. Captures
      "how hard to get in."
  - name: dianping_rating
    key: dianping_rating
    required: false
    description: Current 大众点评 rating (0-5.0 scale) at time of capture. Snapshot, not authoritative.
  - name: black_pearl
    key: black_pearl
    required: false
    description: |
      Object — {first_listed_year: int, current_level: one-diamond | two-diamond | three-diamond,
      latest_year: int}. Null if never listed.
  - name: michelin
    key: michelin
    required: false
    description: |
      Object — {first_listed_year: int, current_stars: 0|1|2|3, bib_gourmand: bool,
      latest_year: int}. Null if never listed.
  - name: buzz_sources
    key: buzz_sources
    required: true
    description: |
      Which signals surfaced this restaurant in this cycle — list any of
      {black-pearl, michelin, dianping, red-xiaohongshu, smartshanghai, time-out,
      公众号, friend-recommend, personal-visit}. Drives the cross-source contradiction
      analysis.
  - name: maturity_signal
    key: maturity_signal
    required: true
    description: |
      One of {hot-new, rising, established, plateaued, declining, closed}.
      With a one-sentence justification citing the evidence.
  - name: vibe_and_space
    key: vibe_and_space
    required: false
    description: |
      One short paragraph — interior, noise level, service style, dress code.
      What's the room actually like.
  - name: personal_verdict
    key: personal_verdict
    required: false
    description: |
      First-person verdict from a personal visit or trusted friend report.
      Highest-trust field. Empty until visited.
  - name: one_paragraph_recommendation
    key: one_paragraph_recommendation
    required: true
    description: |
      The one paragraph that captures whether and when to recommend this
      place. This field is the synthesis editor's primary input.
  - name: contradictions
    key: contradictions
    required: false
    description: |
      Cross-source disagreements — e.g., "high 大众点评 but dismissed in 公众号
      reviews", "viral on 小红书 but service complaints in editorial reviews."
      Where the signals fight each other.
  - name: last_verified_at
    key: last_verified_at
    required: true
    description: |
      Date of the most recent evidence used in this record (YYYY-MM-DD). Restaurants
      go cold fast; re-deepen entries older than 3 months.

graph_edge_types:
  - name: belongs_to_route
    key: belongs_to_route
    description: Restaurant X is researched under execution route Y (links a work to its primary route bucket).
  - name: same_cuisine
    key: same_cuisine
    description: Restaurants X and Y share the same primary cuisine type.
  - name: same_district
    key: same_district
    description: Restaurants X and Y are in the same Shanghai district.
  - name: same_neighborhood
    key: same_neighborhood
    description: Restaurants X and Y are in the same sub-district neighborhood (walkable).
  - name: same_chef
    key: same_chef
    description: Restaurants X and Y share a head chef.
  - name: same_group
    key: same_group
    description: Restaurants X and Y are operated by the same restaurant group.
  - name: similar_occasion
    key: similar_occasion
    description: Restaurants X and Y suit overlapping occasion buckets (e.g., both date-night).
  - name: successor_concept
    key: successor_concept
    description: Restaurant X is the same chef's / group's next concept after Y (Y may be still open or closed).
  - name: companion_pair
    key: companion_pair
    description: Restaurants X and Y are frequently recommended together (e.g., dinner + dessert nearby).
  - name: co_listed
    key: co_listed
    description: Restaurants X and Y appear together on the same authoritative list (same Black Pearl year, same 必吃榜).
  - name: buzz_pair
    key: buzz_pair
    description: Restaurants X and Y surfaced together from the same buzz wave (same 小红书 viral cycle, same editorial round-up).
  - name: contrasted_in
    key: contrasted_in
    description: Restaurants X and Y are explicitly compared in the same review or article.

report_sections:
  - tldr
  - hot_right_now
  - by_cuisine
  - by_occasion
  - by_district
  - classics_aging_well
  - fading_or_overrated
  - chef_and_group_lineage
  - open_questions

iteration_mix:
  new_min: 1
  deepen_min: 1
  challenge_min: 1
  synthesis_every_n_cycles: 7
