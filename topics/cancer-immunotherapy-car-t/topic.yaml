meta:
  slug: cancer-immunotherapy-car-t
  name: Cancer Immunotherapy — CAR-T Techniques (2023+)
  description: >
    Continuous watch on CAR-T cell therapy for cancer, focused on technical
    routes that meaningfully change the modality envelope from 2023 onward:
    allogeneic / off-the-shelf platforms, in vivo CAR generation via
    mRNA-LNP / AAV, solid-tumor CAR-T, and armored / logic-gated /
    next-generation construct designs. Goal: maintain a living, decision-grade
    dossier of mechanisms, programs, and clinical readouts.
  status: accepted
  created_at: 2026-05-25
  accepted_at: 2026-05-25

# Conceptual ontology — how claims about CAR-T are reasoned about.
# Distinct from execution_routes (which are search/memory buckets).
concept_layers:
  - id: biology_immunology
    name: T-cell biology & tumor immunology
    purpose: >
      The substrate. T-cell exhaustion, memory subsets, antigen biology,
      tumor microenvironment, MHC context. Every CAR claim ultimately
      bottoms out here.
  - id: construct_engineering
    name: CAR construct engineering
    purpose: >
      Molecular design layer — binders (scFv / VHH / DARPin), hinges,
      transmembrane, costimulatory domains (CD28, 4-1BB, ICOS), signaling
      tuning, logic gates, armoring payloads.
  - id: manufacturing_delivery
    name: Manufacturing & delivery platform
    purpose: >
      Where the cells come from and how they reach the patient.
      Autologous vs. allogeneic (TALEN / CRISPR / iPSC) vs. in vivo
      (mRNA-LNP, AAV). Vein-to-vein time, scalability, cost.
  - id: clinical_translation
    name: Clinical translation
    purpose: >
      Trial design, dose, lymphodepletion, response rates, durability,
      toxicity (CRS, ICANS, HLH, secondary malignancies), real-world evidence.
  - id: ecosystem
    name: Ecosystem & landscape
    purpose: >
      Sponsors, regulators, IP / patent dynamics, partnerships, capital flows.
      Context that shapes which technical routes get serious investment.

# Stable search / memory buckets — where to look, not how to think.
execution_routes:
  - id: peer_reviewed_literature
    name: Peer-reviewed literature
    sources: [PubMed, Nature/NEJM/Lancet/Blood/Cell family, Science Translational Medicine, Mol Ther, JITC]
    cadence: continuous
  - id: preprints
    name: Preprints
    sources: [bioRxiv, medRxiv, ChemRxiv]
    cadence: continuous
  - id: clinical_trials_registry
    name: Clinical trials registry
    sources: [ClinicalTrials.gov, EU CTR, Chinese CDE / chinadrugtrials.org.cn]
    cadence: weekly
  - id: conference_proceedings
    name: Conference proceedings & abstracts
    sources: [ASH, ASCO, AACR, SITC, EHA, ASGCT, CICON]
    cadence: event-driven
  - id: regulatory_filings
    name: Regulatory filings & approvals
    sources: [Drugs@FDA, EMA EPAR, NMPA, PMDA, FDA AdComm transcripts]
    cadence: continuous
  - id: company_disclosures
    name: Company disclosures & pipeline intel
    sources: [SEC EDGAR (10-K, 10-Q, 8-K, S-1), investor presentations, JPM Healthcare deck dumps, press releases]
    cadence: continuous
  - id: patent_landscape
    name: Patent landscape
    sources: [USPTO PatentsView, EPO Espacenet, WIPO PatentScope, Google Patents]
    cadence: monthly
  - id: industry_press_analyst
    name: Industry press & analyst takes
    sources: [Endpoints News, STAT, Fierce Biotech, BioCentury, BioPharma Catalyst, Evaluate]
    cadence: continuous
  - id: kol_social
    name: KOL & community signal
    sources: [Twitter/X (Carl June, Marcela Maus, Steven Rosenberg, Crystal Mackall, Saar Gill, Bruce Levine, etc.), LinkedIn, oncology Substacks]
    cadence: continuous
  - id: data_safety_databases
    name: Pharmacovigilance & safety databases
    sources: [FDA FAERS, EudraVigilance, WHO VigiBase]
    cadence: monthly

scope_in:
  - CAR construct design (binder format, hinge, TM, costim, signaling, logic-gated, armored)
  - Allogeneic / off-the-shelf CAR platforms (TALEN, CRISPR-edited, base/prime-edited, iPSC-derived)
  - In vivo CAR generation (mRNA-LNP, AAV, lentiviral in situ)
  - Solid-tumor CAR-T (novel targets, TME engineering, locoregional delivery, dominant-negative TGFβ)
  - Dual / tandem / split / SUPRA / SynNotch logic-gated CAR designs
  - Cytokine-armored CARs (IL-7/CCL19, IL-12, IL-15, IL-18) and switch receptors
  - Targets and antigen escape (CD19, CD20, CD22, BCMA, GPRC5D, FCRH5, Claudin18.2, GPC3, MSLN, B7-H3, EGFR, CLL-1, FLT3, others)
  - Manufacturing innovation (point-of-care, rapid manufacturing, non-viral, virus-free)
  - Lymphodepletion regimens and conditioning
  - Clinical outcomes: efficacy, durability, MRD, relapse mechanisms
  - Safety: CRS, ICANS, prolonged cytopenia, HLH, secondary T-cell malignancies, neurotoxicity
  - Combination strategies (BTKi, BCL2i, checkpoint inhibitors, gamma-secretase inhibitors, IMiDs)
  - Companies and programs in development (clinical-stage focus, but pre-clinical for novel modalities)

scope_out:
  - Non-CAR adoptive cell therapies (TCR-T, TIL, NK without engineered CAR) — only referenced when directly contrasting CAR-T
  - Small-molecule immuno-oncology in isolation (checkpoint inhibitors as monotherapy)
  - Cancer vaccines (mRNA / peptide tumor vaccines) unless used as CAR-T combination
  - Bispecific antibodies and ADCs as standalone (only when directly compared to CAR-T in same indication)
  - Pre-2023 work, except as cited foundational anchors
  - CAR-T in non-oncology indications (autoimmune CD19 CAR-T) — only when safety signal is informative for cancer use
  - General hematology unrelated to CAR-T mechanism

recency_floor: 2023

record_fields:
  - id: id
    required: true
    desc: stable slug (lowercase-hyphenated) — primary key in indexes
  - id: title
    required: true
    desc: full title of paper / press release / abstract / trial
  - id: authors_or_org
    required: true
    desc: lead author + institution OR company / sponsor / regulator
  - id: year
    required: true
    desc: integer
  - id: venue
    required: true
    desc: journal / preprint server / conference / company / regulator / registry
  - id: doi_or_url
    required: true
    desc: stable identifier
  - id: modality
    required: true
    desc: "one of: autologous | allogeneic | in_vivo | armored | solid_tumor | logic_gated | mixed | n/a"
  - id: target_antigen
    required: false
    desc: e.g. CD19, BCMA, GPRC5D, Claudin18.2, GPC3, MSLN; or 'multiple' / 'n/a'
  - id: indication
    required: false
    desc: cancer type — e.g. r/r DLBCL, MM, ALL, AML, glioblastoma, gastric, pancreatic
  - id: clinical_phase
    required: true
    desc: "preclinical | Phase I | Phase I/II | Phase II | Phase III | approved | translational | mechanism | n/a"
  - id: key_finding
    required: true
    desc: 1-3 sentences — the actual claim, with effect size or magnitude where applicable
  - id: novelty
    required: true
    desc: what's new vs. prior art in this same route
  - id: limitations
    required: true
    desc: design flaws, confounders, generalizability gaps, missing controls
  - id: relation_to_topic
    required: true
    desc: which concept_layer(s) and execution_route(s) this belongs to
  - id: evidence_strength
    required: true
    desc: "anecdote | preclinical_in_vitro | preclinical_in_vivo | small_trial | pivotal_trial | rwe | regulatory_decision"
  - id: contradicts_or_supports
    required: false
    desc: ids of other records this strengthens or contradicts

graph_edge_types:
  - targets             # CAR / program -> antigen
  - developed_by        # program -> company / institution
  - supersedes          # newer design / data -> older
  - combined_with       # CAR -> combination agent (drug or regimen)
  - enables             # platform / technology -> downstream capability
  - contradicts         # finding -> finding
  - builds_on           # work -> prior work it explicitly extends
  - trials_in           # program -> indication
  - regulated_by        # program -> approval / IND / orphan designation
  - manufactured_via    # program -> manufacturing platform / vector
  - escapes             # mechanism -> target antigen (resistance)
  - causes              # therapy -> toxicity / adverse event

report_sections:
  - executive_snapshot
  - modality_landscape           # autologous vs. allogeneic vs. in vivo
  - antigen_and_indication_map
  - construct_engineering_trends
  - manufacturing_and_scaling
  - solid_tumor_frontier
  - safety_and_toxicity
  - combination_strategies
  - player_and_pipeline_tracker
  - open_questions_and_contradictions

iteration_mix:
  new_min: 1
  deepen_min: 1
  challenge_min: 1
  synthesis_every_n_cycles: 7
