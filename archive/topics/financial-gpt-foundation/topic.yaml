meta:
  slug: financial-gpt-foundation
  name: Financial GPT / Foundation Model Training
  description: >
    Research program for designing and training an in-house financial foundation
    model. Spans text-side financial LLMs (BloombergGPT-style, FinGPT, FinMA),
    domain-adaptive pretraining, instruction tuning and preference optimization
    on finance data, MoE / scaling tradeoffs for domain models, finance-native
    non-text foundation models (time-series, LOB, multimodal), and the
    evaluation infrastructure needed to tell whether any of it actually works.
  status: accepted
  created_at: 2026-05-25
  accepted_at: 2026-05-25

concept_layers:
  - key: data
    name: Data
    description: >
      Financial corpus construction — what counts as finance text (filings,
      transcripts, news, research, regulatory, tabular), how to mix it with
      general pretraining data, dedup and quality filtering, leakage and
      look-ahead bias, and how multimodal (numeric / time-series / table)
      signal is integrated.
  - key: objective
    name: Pretraining & Adaptation Objective
    description: >
      The learning signal that turns a base model into a financial one —
      continued pretraining (DAPT), instruction tuning (SFT) with finance
      tasks, preference optimization (RLHF / DPO / KTO) for reasoning and
      hallucination, and hybrid recipes.
  - key: backbone_and_scale
    name: Backbone & Scale
    description: >
      Architecture choice and scaling behavior — dense Transformer vs MoE,
      parameter / token budget, context length for long filings, scaling-law
      evidence specific to domain-adapted models, where domain-specific
      pretraining beats a stronger general LLM and where it loses.
  - key: adaptation_and_eval
    name: Adaptation Path & Evaluation
    description: >
      How the model is moved from pretrained checkpoint to deployable system
      — retrieval, tool use, long-context, agentic finance workflows — and
      how its financial competence is measured (FinBen, FinanceBench,
      BizBench, hallucination measurement, time-series transfer evals).

execution_routes:
  - key: domain_adaptive_pretraining
    name: Domain-Adaptive Pretraining for Finance
    description: >
      Continued / from-scratch pretraining on finance-heavy corpora; corpus
      composition, mixture ratios, dedup. The "BloombergGPT path."
    anchor_examples: [BloombergGPT, FinPythia, FinLLaMA, FinTral]
  - key: open_finance_llms
    name: Open Financial LLMs
    description: >
      Open-weights finance-tuned LLMs and their training recipes; what was
      changed from the base model and what was actually evaluated.
    anchor_examples: [FinGPT, FinMA, FinLLaMA, "Llama-3 finance forks"]
  - key: instruction_tuning_finance
    name: Instruction Tuning on Finance Tasks
    description: >
      SFT on finance instruction datasets — financial QA, summarization,
      classification, structured extraction from filings, numerical
      reasoning.
    anchor_examples: [FinMA-IT, "PIXIU instruction sets", "finance-instruct datasets"]
  - key: rlhf_dpo_finance
    name: Preference Optimization for Finance Reasoning
    description: >
      RLHF / DPO / KTO targeted at finance-specific failure modes —
      hallucinated numbers, fabricated citations, unsafe advice, reasoning
      under tabular evidence.
    anchor_examples: ["DPO recipes for domain LLMs", "finance preference datasets"]
    # UNCERTAIN: this route's anchor list is thin in public literature; loop should expand.
  - key: mixture_of_experts_finance
    name: MoE & Scaling for Domain Models
    description: >
      MoE architectures and scaling-law work bearing on the question "is a
      smaller domain-specialized model better than a larger general one?"
    anchor_examples: [Mixtral, "DeepSeek-MoE", "scaling-law replications", DBRX]
  - key: long_context_and_retrieval_finance
    name: Long-Context & Retrieval for Filings
    description: >
      Architectures and recipes for very-long-context financial reasoning
      (10-K / 10-Q, transcripts, multi-doc) and retrieval-augmented finance
      QA. Bridges to product use cases.
    anchor_examples: [FinanceBench, "long-context RAG benchmarks", LongBench-Finance]
  - key: finance_data_curation
    name: Finance Corpus Construction & Quality
    description: >
      How the training corpus itself is built — sources, licensing,
      deduplication, decontamination against evals, temporal split to avoid
      look-ahead.
    anchor_examples: ["BloombergGPT corpus notes", "FinPile", "EDGAR pipelines"]
  - key: finance_native_foundation_models
    name: Finance-Native (Non-Text) Foundation Models
    description: >
      Non-text foundation models for finance — time-series, LOB, event
      streams, multimodal price/news fusion. Separate lens from the text-LLM
      side; recorded here when the lens is "as a foundation-model training
      problem" (recipe / scale / eval / deployment), not pure microstructure
      sequence modeling.
    anchor_examples: [Chronos, Moirai, TimesFM, "LOB-FM proposals"]
  - key: finance_benchmarks_and_eval
    name: Financial Benchmarks & Evaluation Infrastructure
    description: >
      Eval suites and methodology for financial reasoning, numerical
      accuracy, hallucination rate, citation faithfulness, and time-series
      transfer. Critical for separating real progress from leaderboard
      noise.
    anchor_examples: [FinBen, FinanceBench, BizBench, "DocFinQA", FLUE]
  - key: agentic_finance
    name: Agentic Finance Systems
    description: >
      Foundation-model-driven agents for finance workflows — multi-step
      research, tool use over market / fundamental APIs, code-execution
      analyst agents. Included when the work surfaces a training or
      adaptation signal back to the base model.
    anchor_examples: ["FinAgent variants", "trading-agent papers", "research-analyst agents"]
    # UNCERTAIN: keep narrow — only include works with clear FM-training implications.

scope_in:
  - Financial LLMs (BloombergGPT-style, FinGPT, FinMA, FinLLaMA, etc.) and their training recipes.
  - Domain-adaptive pretraining, continued pretraining, and corpus construction for finance.
  - Instruction tuning, RLHF / DPO / KTO targeted at finance tasks and failure modes.
  - MoE architectures and scaling-law evidence relevant to domain-specialized models.
  - Long-context and retrieval-augmented architectures for filings and multi-doc finance reasoning.
  - Finance-native non-text foundation models (time-series, LOB, multimodal) viewed as FM-training problems.
  - Evaluation benchmarks for financial reasoning, hallucination, citation faithfulness, time-series transfer.

scope_out:
  - General-purpose LLM training work with no finance-specific mechanism, data, or evaluation.
  - Single-task finance NLP models (sentiment, NER) without a foundation-model framing.
  - Pre-2023 work cited as primary evidence (historical anchors only; see recency_floor).
  - Marketing or vendor material about "finance AI" without mechanism-level technical content.
  - Pure trading-strategy backtest papers that use an LLM as a black box, with no training claim.

recency_floor: 2023

record_fields:
  - {key: title,                                     required: true,  description: "Paper / repo / blog title."}
  - {key: year,                                      required: true,  description: "Publication or first-release year."}
  - {key: source_type,                               required: true,  description: "paper / repo / blog / preprint / report."}
  - {key: url_primary,                               required: true,  description: "Canonical link."}
  - {key: url_pdf,                                   required: false, description: "PDF link if available."}
  - {key: url_code,                                  required: false, description: "Code or model-weights link if available."}
  - {key: model_family,                              required: false, description: "Base model family if a finetune (Llama / Mistral / Qwen / DeepSeek / Pythia / etc.)."}
  - {key: param_count,                               required: false, description: "Parameter count (e.g., 7B, 13B, 50B)."}
  - {key: token_budget,                              required: false, description: "Pretraining or continued-pretraining token count if reported."}
  - {key: training_stage,                            required: true,  description: "from-scratch / continued-pretraining / SFT / RLHF / DPO / hybrid."}
  - {key: corpus_composition,                        required: false, description: "Finance vs general mix; data sources named."}
  - {key: input_representation,                      required: true,  description: "Tokenization / context window / multimodal encoding choices."}
  - {key: training_objective,                        required: true,  description: "Exact learning signal."}
  - {key: backbone_family,                           required: false, description: "Dense Transformer / MoE / SSM / hybrid / etc."}
  - {key: asset_class_or_domain,                     required: false, description: "Equities / fixed income / multi-asset / generic finance text / specific sub-domain."}
  - {key: market_region,                             required: false, description: "US / EU / CN / multi / unknown."}
  - {key: analysis_depth,                            required: true,  description: "shallow / medium / deep."}
  - {key: core_mechanism,                            required: true,  description: "The technical mechanism in concrete terms."}
  - {key: training_recipe,                           required: false, description: "Data, batch, schedule, regularization, hardware."}
  - {key: key_empirical_claim,                       required: true,  description: "Headline empirical claim."}
  - {key: benchmark_and_metrics,                     required: false, description: "Datasets and metrics used."}
  - {key: ablation_or_evidence_notes,                required: false, description: "Evidence quality notes — ablations, baselines, contamination checks."}
  - {key: foundation_model_potential,                required: false, description: "Why this might transfer or scale to an in-house FM."}
  - {key: why_relevant_for_inhouse_training,         required: true,  description: "Concrete transfer path to our in-house financial FM."}
  - {key: reference_value,                           required: false, description: "must-read / supporting / shallow-strategic / low."}
  - {key: main_limitations,                          required: false, description: "Acknowledged limits in the work."}
  - {key: deployment_risks,                          required: true,  description: "Failure modes in finance deployment — hallucination, look-ahead leakage, regime mismatch, citation infidelity, etc."}
  - {key: implementation_takeaways,                  required: false, description: "Borrow-first list."}
  - {key: must_test_hypotheses,                      required: false, description: "H_* labelled hypotheses."}
  - {key: open_questions,                            required: false, description: "What remains unresolved."}
  - {key: related_works,                             required: false, description: "Cross-references."}

graph_edge_types:
  - {key: uses_data_recipe,           description: "Work uses a specific corpus / data-mixture recipe."}
  - {key: uses_objective,             description: "Work uses a specific training objective or adaptation stage."}
  - {key: uses_backbone,              description: "Work uses a specific backbone family or scaling regime."}
  - {key: belongs_to_route,           description: "Work primarily lives in a given execution_route."}
  - {key: extends,                    description: "Work extends or builds on another work."}
  - {key: compares_against,           description: "Work benchmarks against another work."}
  - {key: supports,                   description: "Work supports a claim or design choice."}
  - {key: contradicts,                description: "Work contradicts a claim or design choice."}
  - {key: transferable_to_inhouse,    description: "Mechanism transfers to our in-house finance FM training."}
  - {key: risky_for_inhouse,          description: "Mechanism is risky / unverified for in-house finance deployment."}
  - {key: suggests_experiment,        description: "Work suggests a concrete experiment for the topic."}

report_sections:
  - executive_summary
  - research_map
  - how_the_research_evolved
  - high_value_technical_points
  - what_seems_reusable
  - what_is_weak_shallow_or_risky
  - contradictions_and_open_questions
  - priority_reading_guide
  - bottom_line_synthesis

iteration_mix:
  new_min: 1
  deepen_min: 1
  challenge_min: 1
  # The merged dispatch stub runs the synthesis editor once every N research
  # iterations. Original split-stub cadence was 2-min researcher vs 15-min
  # synthesis (ratio ~7); keep that ratio unless you have a reason to change it.
  synthesis_every_n_cycles: 7
